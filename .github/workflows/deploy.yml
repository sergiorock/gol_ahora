name: Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Configure SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_vps
          chmod 600 ~/.ssh/id_vps

      - name: Upload production env file
        env:
          APP_ENV_FILE: ${{ secrets.APP_ENV_FILE }}
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i ~/.ssh/id_vps deploy@187.77.46.31 "mkdir -p /home/deploy/apps/gol_ahora"
          printf '%s' "$APP_ENV_FILE" | ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i ~/.ssh/id_vps deploy@187.77.46.31 "cat > /home/deploy/apps/gol_ahora/.env.production"

      - name: Deploy on VPS
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i ~/.ssh/id_vps deploy@187.77.46.31 <<'EOF'
          set -eu

          APP_DIR=/home/deploy/apps/gol_ahora

          mkdir -p "$APP_DIR"

          if [ ! -d "$APP_DIR/.git" ]; then
            git -C "$APP_DIR" init
            git -C "$APP_DIR" remote add origin https://github.com/sergiorock/gol_ahora.git
          fi

          cd "$APP_DIR"
          git fetch origin main
          if git show-ref --verify --quiet refs/heads/main; then
            git checkout main
          else
            git checkout -b main origin/main
          fi
          git merge --ff-only origin/main
          TARGET_SHA="$(git rev-parse HEAD)"

          docker compose --env-file .env.production -f docker-compose.prod.yml build web
          docker compose --env-file .env.production -f docker-compose.prod.yml up -d db
          docker compose --env-file .env.production -f docker-compose.prod.yml run -T --rm --no-deps web bin/rails db:prepare
          docker compose --env-file .env.production -f docker-compose.prod.yml run -T --rm --no-deps web bin/rails db:seed
          docker compose --env-file .env.production -f docker-compose.prod.yml up -d --force-recreate web caddy --remove-orphans
          docker compose --env-file .env.production -f docker-compose.prod.yml exec -T web bin/rails assets:precompile

          RUNNING_SHA="$(docker compose --env-file .env.production -f docker-compose.prod.yml exec -T web git rev-parse HEAD)"
          if [ "$RUNNING_SHA" != "$TARGET_SHA" ]; then
            docker compose --env-file .env.production -f docker-compose.prod.yml rm -sf web caddy
            docker compose --env-file .env.production -f docker-compose.prod.yml up -d web caddy --remove-orphans
            RUNNING_SHA="$(docker compose --env-file .env.production -f docker-compose.prod.yml exec -T web git rev-parse HEAD)"
          fi

          test "$RUNNING_SHA" = "$TARGET_SHA"
          EOF
