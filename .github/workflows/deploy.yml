name: Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Configure SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_vps
          chmod 600 ~/.ssh/id_vps

      - name: Upload production env file
        env:
          APP_ENV_FILE: ${{ secrets.APP_ENV_FILE }}
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i ~/.ssh/id_vps deploy@187.77.46.31 "mkdir -p /home/deploy/apps/gol_ahora"
          printf '%s' "$APP_ENV_FILE" | ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i ~/.ssh/id_vps deploy@187.77.46.31 "cat > /home/deploy/apps/gol_ahora/.env.production"

      - name: Deploy on VPS
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i ~/.ssh/id_vps deploy@187.77.46.31 <<'EOF'
          set -eu

          APP_DIR=/home/deploy/apps/gol_ahora

          if [ ! -d "$APP_DIR/.git" ]; then
            git clone https://github.com/sergiorock/gol_ahora.git "$APP_DIR"
          fi

          cd "$APP_DIR"
          git fetch origin main
          git checkout main
          git pull --ff-only origin main

          docker compose --env-file .env.production -f docker-compose.prod.yml up -d --build --remove-orphans
          docker compose --env-file .env.production -f docker-compose.prod.yml exec -T web bin/rails db:prepare
          EOF
