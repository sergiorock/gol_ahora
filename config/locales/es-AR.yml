es-AR:
  activerecord:
    models:
      user:        Usuario
      court_type:  Tipo de cancha
      court:       Cancha
      court_block: Bloqueo de cancha
      reservation: Reserva
      payment:     Pago

    attributes:
      user:
        email:                Email
        password:             Contraseña
        password_confirmation: Confirmar contraseña
        current_password:     Contraseña actual
        first_name:           Nombres
        last_name:            Apellido
        dni:                  DNI
        birth_date:           Fecha de nacimiento
        phone:                Teléfono
        address:              Domicilio
        postal_code:          Código postal
        city:                 Ciudad
        country:              País
        role:                 Rol
        joined_at:            Fecha de ingreso

      court_type:
        name:                 Nombre
        surface:              Superficie
        capacity:             Capacidad
        max_duration_minutes: Duración máxima (minutos)
        price_per_hour:       Precio por hora

      court:
        name:         Nombre
        description:  Descripción
        status:       Estado
        court_type:   Tipo de cancha
        court_type_id: Tipo de cancha

      court_block:
        starts_at: Fecha de inicio
        ends_at:   Fecha de fin
        reason:    Motivo

    errors:
      models:
        user:
          attributes:
            email:
              taken: ya está registrado
              blank: no puede estar en blanco
              invalid: no es válido
            first_name:
              blank: no puede estar en blanco
            last_name:
              blank: no puede estar en blanco
            dni:
              taken: ya está registrado
            password:
              too_short: es demasiado corta (mínimo %{count} caracteres)
        court_type:
          attributes:
            name:
              blank: no puede estar en blanco
              taken: ya existe un tipo con ese nombre y superficie
            surface:
              blank: no puede estar en blanco
            capacity:
              blank: no puede estar en blanco
              greater_than: debe ser mayor a 0
            max_duration_minutes:
              blank: no puede estar en blanco
              greater_than: debe ser mayor a 0
            price_per_hour:
              blank: no puede estar en blanco
              greater_than: debe ser mayor a 0
        court:
          attributes:
            name:
              blank: no puede estar en blanco
            court_type:
              blank: no puede estar en blanco
        reservation:
          attributes:
            starts_at:      Hora de inicio
            ends_at:        Hora de fin
            total_amount:   Monto total
            deposit_amount: Monto de seña
            court:          Cancha
            court_id:       Cancha
            notes:          Notas
        payment:
          attributes:
            amount:           Monto
            last_four_digits: Últimos 4 dígitos
            cardholder_name:  Nombre del titular
            expiry_date:      Vencimiento
        court_block:
          attributes:
            starts_at:
              blank: no puede estar en blanco
            ends_at:
              blank: no puede estar en blanco
              greater_than: debe ser posterior a la fecha de inicio
            reason:
              blank: no puede estar en blanco

  date:
    abbr_month_names: [~, ene, feb, mar, abr, may, jun, jul, ago, sep, oct, nov, dic]
    month_names:      [~, enero, febrero, marzo, abril, mayo, junio, julio, agosto, septiembre, octubre, noviembre, diciembre]
    abbr_day_names:   [dom, lun, mar, mié, jue, vie, sáb]
    day_names:        [domingo, lunes, martes, miércoles, jueves, viernes, sábado]
    formats:
      default: "%d/%m/%Y"
      short:   "%-d %b"
      long:    "%-d de %B de %Y"

  time:
    formats:
      default: "%d/%m/%Y %H:%M"
      short:   "%-d %b, %H:%M"
      long:    "%-d de %B de %Y, %H:%M"
    am: "am"
    pm: "pm"

  number:
    currency:
      format:
        unit:      "$"
        precision: 0
        separator: ","
        delimiter: "."
        format:    "%u%n"
    format:
      separator: ","
      delimiter: "."

  charge:
    types:
      rental:     Alquiler
      enrollment: Inscripción
      class_fee:  Clase
      other:      Otro
    payment_methods:
      cash:     Efectivo
      transfer: Transferencia
      card:     Tarjeta

  reservation:
    statuses:
      pending:     Pendiente
      confirmed:   Confirmada
      in_progress: En curso
      finished:    Finalizada
      cancelled:   Cancelada

  errors:
    messages:
      blank:          no puede estar en blanco
      taken:          ya está en uso
      invalid:        no es válido
      too_short:      es demasiado corto (mínimo %{count} caracteres)
      too_long:       es demasiado largo (máximo %{count} caracteres)
      not_a_number:   no es un número
      greater_than:   debe ser mayor a %{count}
      less_than:      debe ser menor a %{count}
      inclusion:      no está incluido en la lista
      confirmation:   no coincide con %{attribute}
