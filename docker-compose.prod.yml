services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_MULTIPLE_DATABASES: ${POSTGRES_DB},${POSTGRES_CACHE_DB},${POSTGRES_QUEUE_DB},${POSTGRES_CABLE_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/postgres/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE_PATH:-.env.production}
    environment:
      PORT: 3000
      RAILS_ENV: production
      RAILS_SERVE_STATIC_FILES: "true"
      BINDING: 0.0.0.0
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "3000"
    volumes:
      - rails_storage:/rails/storage

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - web
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  rails_storage:
  caddy_data:
  caddy_config:
